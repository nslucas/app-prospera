spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/prospera}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Lucas2546!}
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.hibernate.ddl-auto
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BIND_LOG_LEVEL:WARN}

api.security.token.secret=${JWT_SECRET:my-secret-key}
api.security.token.expiration-hours=${JWT_EXPIRATION_HOURS:720}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://appprospera.com.br,https://www.appprospera.com.br,https://api.appprospera.com.br,https://*.lovable.app}
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:native}
app.security.auth-rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
app.security.auth-rate-limit.cache-max-entries=${AUTH_RATE_LIMIT_CACHE_MAX_ENTRIES:100000}
app.security.auth-rate-limit.login-ip.capacity=${AUTH_LOGIN_IP_CAPACITY:30}
app.security.auth-rate-limit.login-ip.period=${AUTH_LOGIN_IP_PERIOD:PT15M}
app.security.auth-rate-limit.login-email.capacity=${AUTH_LOGIN_EMAIL_CAPACITY:5}
app.security.auth-rate-limit.login-email.period=${AUTH_LOGIN_EMAIL_PERIOD:PT15M}
app.security.auth-rate-limit.register-ip.capacity=${AUTH_REGISTER_IP_CAPACITY:5}
app.security.auth-rate-limit.register-ip.period=${AUTH_REGISTER_IP_PERIOD:PT1H}
app.security.auth-rate-limit.register-email.capacity=${AUTH_REGISTER_EMAIL_CAPACITY:3}
app.security.auth-rate-limit.register-email.period=${AUTH_REGISTER_EMAIL_PERIOD:P1D}
app.push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${PUSH_VAPID_SUBJECT:mailto:admin@appprospera.com.br}
app.notifications.digest-cron=${NOTIFICATIONS_DIGEST_CRON:0 0 9 * * *}
app.notifications.cleanup-cron=${NOTIFICATIONS_CLEANUP_CRON:0 30 3 * * SUN}
app.notifications.retention-days=${NOTIFICATIONS_RETENTION_DAYS:90}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
